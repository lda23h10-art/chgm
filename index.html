<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Arcade</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    text-align:center;
}

.screen{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

input{
    padding:10px;
    width:300px;
    max-width:90%;
    border-radius:8px;
    border:none;
}

canvas{
    background:black;
    border:2px solid white;
}
</style>
</head>
<body>

<div id="menu" class="screen active">
    <h1>🎮 Mini Arcade</h1>

    <input id="search" placeholder="Search games...">

    <div id="gameList">
        <button onclick="showGame('snakeScreen')">Snake</button>
        <button onclick="showGame('breakoutScreen')">Breakout</button>
        <button onclick="showGame('flappyScreen')">Flappy Bird</button>
    </div>
</div>

<div id="snakeScreen" class="screen">
    <h2>Snake</h2>
    <p>Score: <span id="snakeScore">0</span></p>

    <canvas id="snakeCanvas" width="400" height="400"></canvas>

    <br>
    <button onclick="showMenu()">Back</button>
</div>

<div id="breakoutScreen" class="screen">
    <h2>Breakout</h2>

    <canvas id="breakoutCanvas" width="800" height="500"></canvas>

    <br>
    <button onclick="showMenu()">Back</button>
</div>

<div id="flappyScreen" class="screen">
    <h2>Flappy Bird</h2>

    <canvas id="flappyCanvas" width="500" height="700"></canvas>

    <br>
    <button onclick="showMenu()">Back</button>
</div>

<script>

function hideScreens(){
    document.querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));
}

function showMenu(){
    hideScreens();
    document.getElementById("menu")
    .classList.add("active");
}

function showGame(id){
    hideScreens();
    document.getElementById(id)
    .classList.add("active");
}

document.getElementById("search")
.addEventListener("input", function(){

    const value=this.value.toLowerCase();

    document.querySelectorAll("#gameList button")
    .forEach(btn=>{

        btn.style.display=
        btn.innerText.toLowerCase()
        .includes(value)
        ? "inline-block"
        : "none";

    });

});

/* ---------------- SNAKE ---------------- */

const snakeCanvas=
document.getElementById("snakeCanvas");

const snakeCtx=
snakeCanvas.getContext("2d");

let snake=[
    {x:10,y:10}
];

let food={
    x:5,
    y:5
};

let snakeDX=1;
let snakeDY=0;

let snakeScore=0;

document.addEventListener("keydown",e=>{

    if(e.key==="ArrowUp"){
        snakeDX=0;
        snakeDY=-1;
    }

    if(e.key==="ArrowDown"){
        snakeDX=0;
        snakeDY=1;
    }

    if(e.key==="ArrowLeft"){
        snakeDX=-1;
        snakeDY=0;
    }

    if(e.key==="ArrowRight"){
        snakeDX=1;
        snakeDY=0;
    }

});

function snakeLoop(){

    let head={
        x:snake[0].x+snakeDX,
        y:snake[0].y+snakeDY
    };

    if(
        head.x<0 ||
        head.y<0 ||
        head.x>=20 ||
        head.y>=20
    ){
        snake=[
            {x:10,y:10}
        ];

        snakeScore=0;

        document.getElementById(
        "snakeScore").textContent=0;

        return;
    }

    snake.unshift(head);

    if(
        head.x===food.x &&
        head.y===food.y
    ){

        snakeScore++;

        document.getElementById(
        "snakeScore").textContent=
        snakeScore;

        food={
            x:Math.floor(Math.random()*20),
            y:Math.floor(Math.random()*20)
        };

    }else{
        snake.pop();
    }

    snakeCtx.fillStyle="black";
    snakeCtx.fillRect(
        0,0,400,400
    );

    snakeCtx.fillStyle="lime";

    snake.forEach(part=>{

        snakeCtx.fillRect(
            part.x*20,
            part.y*20,
            18,
            18
        );

    });

    snakeCtx.fillStyle="red";

    snakeCtx.fillRect(
        food.x*20,
        food.y*20,
        18,
        18
    );
}

setInterval(
    snakeLoop,
    120
);

/* BREAKOUT AND FLAPPY START BELOW */

```html
/* ---------------- BREAKOUT ---------------- */

const breakoutCanvas =
document.getElementById("breakoutCanvas");

const breakoutCtx =
breakoutCanvas.getContext("2d");

let paddle={
    x:350,
    y:470,
    w:100,
    h:15
};

let ball={
    x:400,
    y:250,
    r:10,
    dx:4,
    dy:-4
};

let bricks=[];

function resetBreakout(){

    bricks=[];

    for(let r=0;r<5;r++){

        for(let c=0;c<10;c++){

            bricks.push({
                x:c*75+20,
                y:r*30+30,
                w:60,
                h:20,
                alive:true
            });

        }

    }

    ball.x=400;
    ball.y=250;
    ball.dx=4;
    ball.dy=-4;
}

resetBreakout();

document.addEventListener("mousemove",e=>{

    const rect=
    breakoutCanvas.getBoundingClientRect();

    paddle.x=
    e.clientX-
    rect.left-
    paddle.w/2;

});

function breakoutLoop(){

    breakoutCtx.clearRect(
        0,0,800,500
    );

    breakoutCtx.fillStyle="white";

    breakoutCtx.fillRect(
        paddle.x,
        paddle.y,
        paddle.w,
        paddle.h
    );

    breakoutCtx.beginPath();

    breakoutCtx.arc(
        ball.x,
        ball.y,
        ball.r,
        0,
        Math.PI*2
    );

    breakoutCtx.fill();

    ball.x+=ball.dx;
    ball.y+=ball.dy;

    if(ball.x<0 || ball.x>800)
        ball.dx*=-1;

    if(ball.y<0)
        ball.dy*=-1;

    if(ball.y>500){
        resetBreakout();
    }

    if(
        ball.x>paddle.x &&
        ball.x<paddle.x+paddle.w &&
        ball.y>paddle.y
    ){
        ball.dy*=-1;
    }

    bricks.forEach(brick=>{

        if(!brick.alive)
            return;

        breakoutCtx.fillRect(
            brick.x,
            brick.y,
            brick.w,
            brick.h
        );

        if(
            ball.x>brick.x &&
            ball.x<brick.x+brick.w &&
            ball.y>brick.y &&
            ball.y<brick.y+brick.h
        ){
            brick.alive=false;
            ball.dy*=-1;
        }

    });

    requestAnimationFrame(
        breakoutLoop
    );
}

breakoutLoop();

/* ---------------- FLAPPY BIRD ---------------- */

const flappyCanvas=
document.getElementById(
"flappyCanvas"
);

const flappyCtx=
flappyCanvas.getContext("2d");

let bird={
    x:100,
    y:300,
    v:0
};

let pipes=[];

document.addEventListener(
"keydown",
()=>{

    bird.v=-8;

}
);

setInterval(()=>{

    const gap=170;

    const topHeight=
    Math.random()*300+50;

    pipes.push({

        x:500,
        top:topHeight,
        bottom:
        topHeight+gap

    });

},1500);

function flappyLoop(){

    requestAnimationFrame(
        flappyLoop
    );

    bird.v+=0.5;

    bird.y+=bird.v;

    flappyCtx.clearRect(
        0,0,500,700
    );

    flappyCtx.fillStyle=
    "yellow";

    flappyCtx.beginPath();

    flappyCtx.arc(
        bird.x,
        bird.y,
        15,
        0,
        Math.PI*2
    );

    flappyCtx.fill();

    flappyCtx.fillStyle=
    "green";

    pipes.forEach(pipe=>{

        pipe.x-=3;

        flappyCtx.fillRect(
            pipe.x,
            0,
            50,
            pipe.top
        );

        flappyCtx.fillRect(
            pipe.x,
            pipe.bottom,
            50,
            700
        );

        if(
            bird.x+15>pipe.x &&
            bird.x-15<pipe.x+50 &&
            (
                bird.y-15<pipe.top ||
                bird.y+15>pipe.bottom
            )
        ){

            bird.y=300;
            bird.v=0;
            pipes=[];

        }

    });

    if(
        bird.y<0 ||
        bird.y>700
    ){

        bird.y=300;
        bird.v=0;
        pipes=[];

    }

}

flappyLoop();

</script>
</body>
</html>
