<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Arcade</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    text-align:center;
}

.screen{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

button{
    padding:12px 24px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

.menu-btn{
    width:250px;
}

canvas{
    background:#000;
    border:2px solid white;
}

#clickArea{
    width:200px;
    height:200px;
    background:orange;
    margin:auto;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu" class="screen active">
    <h1>🎮 Mini Arcade</h1>

    <button class="menu-btn" onclick="startSnake()">🐍 Snake</button><br>
    <button class="menu-btn" onclick="startDodge()">⬛ Dodge Blocks</button><br>
    <button class="menu-btn" onclick="startClicker()">🖱 Clicker Challenge</button>
</div>

<!-- SNAKE -->
<div id="snakeScreen" class="screen">
    <h2>🐍 Snake</h2>
    <p>Score: <span id="snakeScore">0</span></p>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <br>
    <button onclick="showMenu()">Back</button>
</div>

<!-- DODGE -->
<div id="dodgeScreen" class="screen">
    <h2>⬛ Dodge Blocks</h2>
    <p>Score: <span id="dodgeScore">0</span></p>
    <canvas id="dodgeCanvas" width="500" height="500"></canvas>
    <br>
    <button onclick="showMenu()">Back</button>
</div>

<!-- CLICKER -->
<div id="clickerScreen" class="screen">
    <h2>🖱 Clicker Challenge</h2>
    <h3>Clicks: <span id="clicks">0</span></h3>
    <div id="clickArea"></div>
    <br>
    <button onclick="showMenu()">Back</button>
</div>

<script>

function hideAll(){
    document.querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));
}

function showMenu(){
    hideAll();
    document.getElementById("menu").classList.add("active");
}

/* ---------------- SNAKE ---------------- */

let snakeLoop;

function startSnake(){

    hideAll();
    document.getElementById("snakeScreen")
    .classList.add("active");

    const canvas =
    document.getElementById("snakeCanvas");

    const ctx = canvas.getContext("2d");

    let snake=[{x:10,y:10}];
    let food={
        x:Math.floor(Math.random()*20),
        y:Math.floor(Math.random()*20)
    };

    let dx=1;
    let dy=0;
    let score=0;

    document.onkeydown=(e)=>{
        if(e.key==="ArrowUp"){dx=0;dy=-1;}
        if(e.key==="ArrowDown"){dx=0;dy=1;}
        if(e.key==="ArrowLeft"){dx=-1;dy=0;}
        if(e.key==="ArrowRight"){dx=1;dy=0;}
    };

    clearInterval(snakeLoop);

    snakeLoop=setInterval(()=>{

        let head={
            x:snake[0].x+dx,
            y:snake[0].y+dy
        };

        if(
            head.x<0||
            head.y<0||
            head.x>=20||
            head.y>=20
        ){
            alert("Game Over!");
            clearInterval(snakeLoop);
            return;
        }

        snake.unshift(head);

        if(
            head.x===food.x &&
            head.y===food.y
        ){
            score++;
            document.getElementById(
            "snakeScore").textContent=score;

            food={
                x:Math.floor(Math.random()*20),
                y:Math.floor(Math.random()*20)
            };
        }else{
            snake.pop();
        }

        ctx.fillStyle="black";
        ctx.fillRect(0,0,400,400);

        ctx.fillStyle="lime";
        snake.forEach(s=>{
            ctx.fillRect(
            s.x*20,s.y*20,18,18);
        });

        ctx.fillStyle="red";
        ctx.fillRect(
        food.x*20,
        food.y*20,
        18,18);

    },120);
}

/* ---------------- DODGE ---------------- */

let dodgeAnimation;

function startDodge(){

    hideAll();
    document.getElementById("dodgeScreen")
    .classList.add("active");

    const canvas =
    document.getElementById("dodgeCanvas");

    const ctx = canvas.getContext("2d");

    let player={
        x:230,
        y:450,
        w:40,
        h:40
    };

    let score=0;

    let blocks=[];

    let keys={};

    window.onkeydown=e=>keys[e.key]=true;
    window.onkeyup=e=>keys[e.key]=false;

    function spawn(){
        blocks.push({
            x:Math.random()*460,
            y:-20,
            w:30,
            h:30
        });
    }

    function loop(){

        dodgeAnimation=
        requestAnimationFrame(loop);

        if(keys["ArrowLeft"])
            player.x-=5;

        if(keys["ArrowRight"])
            player.x+=5;

        ctx.clearRect(0,0,500,500);

        ctx.fillStyle="cyan";
        ctx.fillRect(
        player.x,
        player.y,
        player.w,
        player.h);

        ctx.fillStyle="red";

        blocks.forEach(b=>{
            b.y+=4;

            ctx.fillRect(
            b.x,b.y,b.w,b.h);

            if(
                b.x<player.x+player.w &&
                b.x+b.w>player.x &&
                b.y<player.y+player.h &&
                b.y+b.h>player.y
            ){
                alert("Game Over!");
                cancelAnimationFrame(
                dodgeAnimation);
            }
        });

        score++;
        document.getElementById(
        "dodgeScore")
        .textContent=Math.floor(score/10);
    }

    blocks=[];
    setInterval(spawn,700);

    loop();
}

/* ---------------- CLICKER ---------------- */

let clicks=0;

function startClicker(){
    hideAll();
    document.getElementById("clickerScreen")
    .classList.add("active");
}

document.getElementById("clickArea")
.addEventListener("click",()=>{
    clicks++;
    document.getElementById("clicks")
    .textContent=clicks;
});

</script>

</body>
</html>
