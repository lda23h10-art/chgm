<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ultimate Arcade</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
}

header{
    padding:20px;
    text-align:center;
}

#search{
    width:80%;
    max-width:600px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1f2937;
    border-radius:12px;
    padding:20px;
    text-align:center;
}

.card h3{
    margin-top:0;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
<h1>🎮 Ultimate Arcade</h1>

<input
id="search"
placeholder="Search games..."
>
</header>

<div class="grid" id="games"></div>

<script>

const games = [
"Snake",
"Tetris",
"Pong",
"Breakout",
"Flappy Bird",
"Space Shooter",
"Asteroids",
"2048",
"Minesweeper",
"Tic Tac Toe",
"Connect Four",
"Memory Match",
"Simon Says",
"Hangman",
"Word Scramble",
"Dodge Blocks",
"Reaction Test",
"Platform Jumper",
"Endless Runner",
"Clicker Empire",
"Chess",
"Checkers",
"Sudoku",
"Color Match",
"Ball Bounce",
"Fruit Catcher",
"Tower Defense",
"Racing",
"Zombie Survival",
"Maze Escape"
];

const container =
document.getElementById("games");

function render(list){

container.innerHTML = "";

list.forEach(game=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML=`
<h3>${game}</h3>
<p>Ready to play</p>
<button onclick="launch('${game}')">
Play
</button>
`;

container.appendChild(card);

});

}

function launch(game){

alert(
game +
" game selected.\n\nReplace this alert with the actual game."
);

}

render(games);

document
.getElementById("search")
.addEventListener("input",e=>{

const term =
e.target.value.toLowerCase();

render(
games.filter(g=>
g.toLowerCase().includes(term)
)
);

});

</script>

</body>
</html>
