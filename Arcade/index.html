<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Arcade</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
}

header{
    padding:30px;
}

#search{
    width:80%;
    max-width:500px;
    padding:12px;
    border-radius:10px;
    border:none;
    font-size:18px;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
<h1>🎮 Mini Arcade</h1>

<input
id="search"
placeholder="Search games..."
>
</header>

<div class="games" id="games">

<div class="card game">
<h2>Snake</h2>
<p>Eat food and grow.</p>
<button onclick="location.href='games/snake.html'">
Play
</button>
</div>

<div class="card game">
<h2>Breakout</h2>
<p>Break all the bricks.</p>
<button onclick="location.href='games/breakout.html'">
Play
</button>
</div>

<div class="card game">
<h2>Flappy Bird</h2>
<p>Fly through pipes.</p>
<button onclick="location.href='games/flappybird.html'">
Play
</button>
</div>

</div>

<script>
const search=document.getElementById("search");

search.addEventListener("input",()=>{

const term=search.value.toLowerCase();

document.querySelectorAll(".game").forEach(game=>{

const text=game.innerText.toLowerCase();

game.style.display=
text.includes(term)
? "block"
: "none";

});
});
</script>

</body>
</html>
