<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird</title>
<style>
body{
margin:0;
overflow:hidden;
background:skyblue;
}
canvas{
display:block;
margin:auto;
background:skyblue;
}
</style>
</head>
<body>

<canvas id="game" width="500" height="700"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let bird={
x:100,
y:300,
v:0
};

const pipes=[];

document.addEventListener("keydown",()=>{
bird.v=-8;
});

setInterval(()=>{

const gap=170;

const topHeight=
Math.random()*300+50;

pipes.push({
x:500,
top:topHeight,
bottom:topHeight+gap
});

},1500);

function loop(){

requestAnimationFrame(loop);

bird.v+=0.5;
bird.y+=bird.v;

ctx.clearRect(0,0,500,700);

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(
bird.x,
bird.y,
15,
0,
Math.PI*2
);
ctx.fill();

ctx.fillStyle="green";

pipes.forEach(pipe=>{

pipe.x-=3;

ctx.fillRect(
pipe.x,
0,
50,
pipe.top
);

ctx.fillRect(
pipe.x,
pipe.bottom,
50,
700
);

if(
bird.x+15>pipe.x &&
bird.x-15<pipe.x+50 &&
(
bird.y-15<pipe.top ||
bird.y+15>pipe.bottom
)
){
alert("Game Over");
location.reload();
}

});

if(bird.y<0||bird.y>700){
alert("Game Over");
location.reload();
}

}

loop();

</script>

</body>
</html>
